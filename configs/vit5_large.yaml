# =====================================================================
# Main experiment: ViT5-large fine-tuned for Vietnamese -> VSL gloss.
# Needs an A100 (40GB) — uses a smaller per-device batch + gradient
# accumulation + gradient checkpointing to fit the ~770M-param model.
# =====================================================================
experiment_name: vit5_large

paths:
  raw_dir: ../Parallel-Corpus-Vie-VSL-main
  processed_dir: data/processed
  splits_dir: data/splits
  output_dir: outputs
  reports_dir: reports

data:
  vie_file: Vie10k.txt
  vsl_file: VSL10k.txt
  vie_tree_file: Vie10k_phantich.txt
  vsl_tree_file: VSL10k_phantich.txt
  lowercase: false
  fix_punct_spacing: true
  collapse_whitespace: true
  drop_empty: true
  seed: 42
  val_ratio: 0.10
  test_ratio: 0.10
  group_by_source: true
  stratify_by_category: true
  dedup_exact_pairs: true

model:
  name_or_path: VietAI/vit5-large
  source_prefix: "chuyen gloss: "
  max_source_length: 96
  max_target_length: 96
  use_fast_tokenizer: false

train:
  num_train_epochs: 15
  learning_rate: 1.0e-4            # lower LR for the larger backbone
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 16
  gradient_accumulation_steps: 2  # effective batch = 16
  weight_decay: 0.01
  warmup_ratio: 0.06
  label_smoothing_factor: 0.1
  lr_scheduler_type: cosine
  optim: adafactor
  bf16: true
  fp16: false
  gradient_checkpointing: true    # trade compute for memory on A100-40GB
  eval_strategy: epoch
  save_strategy: epoch
  save_total_limit: 2
  logging_steps: 50
  metric_for_best_model: bleu
  greater_is_better: true
  load_best_model_at_end: true
  predict_with_generate: true
  early_stopping_patience: 3
  dataloader_num_workers: 2
  seed: 42

decode:
  num_beams: 5
  max_new_tokens: 96
  length_penalty: 1.0
  no_repeat_ngram_size: 0
  early_stopping: true
  constrained: false

eval:
  report_categories: true
  report_normalized: true
  error_examples_per_category: 15
